function incrementUsageCount(id) {
  const k="usage_"+id; localStorage.setItem(k,(parseInt(localStorage.getItem(k)||"0"))+1);
}
function getUsageCount(id) { return parseInt(localStorage.getItem("usage_"+id)||"0"); }

// ── Punt 4: Indicador secció/tasques ───────────────────────────────────────────
function updateSectionIndicator() {
  const el = document.getElementById("section-indicator");
  if (!el || !current) { if (el) el.style.display = "none"; return; }
  const mode = current.mode || "protocol";
  let text;
  if (mode === "protocol") {
    text = `${sectionIndex + 1} / ${(current.sections || []).length}`;
  } else {
    // Usar getChecklistStatus per evitar doble comptatge
    let total = 0;
    let pending = 0;
    (current.checklistSections || []).forEach(s => (s.tasks || []).forEach(tk => {
      total++;
      if (!tk.done) pending++;
    }));
    text = `${pending} pend. / ${total}`;
  }
  el.textContent = text; el.style.display = "block";
}

// ── Punt 5: Estat persistent checklist ───────────────────────────────────────────────
const CHECKLIST_PROGRESS_KEY="checklist_in_progress";

function saveChecklistProgress(){
  if(!current||(current.mode||"protocol")!=="checklist")return;
  localStorage.setItem(CHECKLIST_PROGRESS_KEY,JSON.stringify({
    id:current.id, timerSeconds, timerOffset, currentTaskPointer,
    checklistSections:JSON.parse(JSON.stringify(current.checklistSections||[]))
  }));
}
function clearChecklistProgress(){
  localStorage.removeItem(CHECKLIST_PROGRESS_KEY);
  updateChecklistProgressBanner();
}
function updateChecklistProgressBanner(){
  const banner=document.getElementById("checklist-progress-banner");
  if(!banner)return;
  const raw=localStorage.getItem(CHECKLIST_PROGRESS_KEY);
  if(!raw){banner.style.display="none";return;}
  try{
    const st=JSON.parse(raw);
    const em=emergencies.find(x=>x.id===st.id);
    const name=em?em.name:"Emergència";
    banner.style.display="block";
    banner.innerHTML=`&#9654; <strong>Checklist en progrés:</strong> ${sanitize(name)} &mdash; toca per reprendre`;
  }catch{banner.style.display="none";}
}
function resumeChecklistInProgress(){
  const raw=localStorage.getItem(CHECKLIST_PROGRESS_KEY);
  if(!raw)return;
  try{
    const st=JSON.parse(raw);
    const em=emergencies.find(x=>x.id===st.id);
    if(!em){clearChecklistProgress();return;}
    em.checklistSections=st.checklistSections;
    current=em; timerSeconds=st.timerSeconds||0; timerOffset=st.timerOffset||0;
    currentTaskPointer=st.currentTaskPointer||null; taskLastAlert={}; sectionIndex=0;
    showScreen("screen-viewer");
    toggleVoiceControl(document.getElementById("voice-toggle").checked);
    document.getElementById("emergency-timer").style.display="block";
    document.getElementById("timer-sync-buttons").style.display="flex";
    ["btn-prev","btn-next"].forEach(id=>document.getElementById(id).style.display="none");
    ["btn-done","btn-skip"].forEach(id=>document.getElementById(id).style.display="inline-block");
    renderChecklist(); updateSectionIndicator(); updateModeBanner();
    autoReadEnabled=!silentMode;
    if(autoReadEnabled)setTimeout(()=>readSection(),150);
    startEmergencyTimerFrom();
  }catch(err){console.error("Error reprendre:",err);clearChecklistProgress();}
}
function startEmergencyTimerFrom(){
  clearInterval(timerInterval); lastOverdueHash="";
  const display=document.getElementById("timer-display");
  document.getElementById("emergency-timer").style.display="block";
  const upd=()=>{display.textContent=String(Math.floor(timerSeconds/60)).padStart(2,"0")+":"+String(timerSeconds%60).padStart(2,"0");};
  upd();
  timerInterval=setInterval(()=>{
    timerSeconds++; upd(); playTick();
    if(timerSeconds%60===0)playBeepLa5();
    checkTaskIntervals(); saveChecklistProgress();
  },1000);
}

//funció dedicada a controlar el botó Finalitzar
function updateFinishButtonVisibility() {
  const finishBtn = document.getElementById("btn-finish");

  // Si no hi ha emergència carregada o no és checklist → amagar
  if (!current || current.mode !== "checklist") {
    finishBtn.style.display = "none";
    finishBtn.disabled = false;
    return;
  }

  // Analitzar estat del checklist
  const { hasMandatory, mandatoryDone, hasOptionalPending, hasAnyPending } = getChecklistStatus();

  // Si no hi ha cap tasca pendent: totes completades → mostrar botó actiu
  if (!hasAnyPending) {
    finishBtn.style.display = "inline-block";
    finishBtn.disabled = false;
    finishBtn.style.opacity = "1";
    return;
  }

  // Si no hi ha tasques obligatòries (tot opcional) → mostrar botó actiu
  if (!hasMandatory) {
    finishBtn.style.display = "inline-block";
    finishBtn.disabled = false;
    finishBtn.style.opacity = "1";
    return;
  }

  // Si hi ha obligatòries i totes estan fetes → mostrar botó actiu
  if (mandatoryDone) {
    finishBtn.style.display = "inline-block";
    finishBtn.disabled = false;
    finishBtn.style.opacity = "1";
    return;
  }

  // Si hi ha obligatòries pendents → amagar el botó
  finishBtn.style.display = "none";
  finishBtn.disabled = false;
}

//Funció per analitzar l’estat del checklist
function getChecklistStatus() {
  let hasMandatory = false;
  let mandatoryDone = true;
  let hasOptionalPending = false;
  let hasAnyPending = false;

  current.checklistSections.forEach(sec => {
    sec.tasks.forEach(t => {
      const req = t.requirement;  // 👈 coherent amb la resta del codi

      const isMandatory =
        req === "mandatory" || req === "interval"; // interval també és obligatori

      if (isMandatory) {
        hasMandatory = true;
        if (!t.done) {
          mandatoryDone = false;
          hasAnyPending = true;
        }
      } else {
        if (!t.done) {
          hasOptionalPending = true;
          hasAnyPending = true;
        }
      }
    });
  });

  return { hasMandatory, mandatoryDone, hasOptionalPending, hasAnyPending };
}
